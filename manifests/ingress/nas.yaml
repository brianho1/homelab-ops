---
# Grafana
apiVersion: v1
kind: Service
metadata:
  name: nas-grafana
  namespace: default
spec:
  ports:
    - name: http
      port: 3340
      targetPort: 3340
      protocol: TCP
---
apiVersion: v1
kind: Endpoints
metadata:
  name: nas-grafana
  namespace: default
subsets:
  - addresses:
      - ip: 192.168.1.244
    ports:
      - name: http
        port: 3340
        protocol: TCP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: nas-grafana
  namespace: default
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "0"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "600"
spec:
  ingressClassName: nginx
  rules:
    - host: grafana.homelab.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: nas-grafana
                port:
                  number: 3340
---
