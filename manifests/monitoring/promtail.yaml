apiVersion: v1
kind: ServiceAccount
metadata:
  labels:
    app.kubernetes.io/name: promtail
  name: promtail
  namespace: monitoring
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: promtail
  name: promtail
rules:
  - apiGroups: [""]
    resources: [nodes, nodes/proxy, pods, pods/log]
    verbs: [get, list, watch]
  - apiGroups: [""]
    resources: [services, endpoints]
    verbs: [get, list, watch]
  - nonResourceURLs: [/metrics]
    verbs: [get]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  labels:
    app.kubernetes.io/name: promtail
  name: promtail
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: promtail
subjects:
  - kind: ServiceAccount
    name: promtail
    namespace: monitoring
---
apiVersion: v1
kind: ConfigMap
metadata:
  labels:
    app.kubernetes.io/component: log-collector
    app.kubernetes.io/name: promtail
  name: promtail-config
  namespace: monitoring
data:
  promtail.yaml: |
    server:
      http_listen_port: 9080
      grpc_listen_port: 0

    positions:
      filename: /run/promtail/positions.yaml

    clients:
      - url: LOKI_URL_PLACEHOLDER

    scrape_configs:
      - job_name: kubernetes-pods
        pipeline_stages:
          - cri: {}
        kubernetes_sd_configs:
          - role: pod
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_uid]
            target_label: __tmp_uid
            regex: ".+"
            action: keep
          - source_labels: [__meta_kubernetes_pod_node_name]
            target_label: node
          - source_labels: [__meta_kubernetes_pod_namespace]
            target_label: namespace
          - source_labels: [__meta_kubernetes_pod_name]
            target_label: pod
          - source_labels: [__meta_kubernetes_pod_container_name]
            target_label: container
          - replacement: rke2
            target_label: cluster
          - replacement: rke2-pods
            target_label: job
          - source_labels: [__meta_kubernetes_pod_namespace, __meta_kubernetes_pod_name, __meta_kubernetes_pod_uid, __meta_kubernetes_pod_container_name]
            separator: /
            regex: "(.+)/(.+)/(.+)/(.+)"
            target_label: __path__
            replacement: /var/log/pods/$1_$2_$3/$4/*.log
      - job_name: kubernetes-pods-uid
        pipeline_stages:
          - cri: {}
        kubernetes_sd_configs:
          - role: pod
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_uid]
            regex: ".+"
            action: keep
          - source_labels: [__meta_kubernetes_pod_node_name]
            target_label: node
          - source_labels: [__meta_kubernetes_pod_namespace]
            target_label: namespace
          - source_labels: [__meta_kubernetes_pod_name]
            target_label: pod
          - source_labels: [__meta_kubernetes_pod_container_name]
            target_label: container
          - replacement: rke2
            target_label: cluster
          - replacement: rke2-pods
            target_label: job
          - source_labels: [__meta_kubernetes_pod_uid, __meta_kubernetes_pod_container_name]
            separator: /
            regex: "(.+)/(.+)"
            target_label: __path__
            replacement: /var/log/pods/$1/$2/*.log
      - job_name: rke2-containers
        pipeline_stages:
          - cri: {}
        static_configs:
          - targets: [localhost]
            labels:
              job: rke2-pods
              cluster: rke2
              __path__: /var/log/containers/*.log
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  labels:
    app.kubernetes.io/component: log-collector
    app.kubernetes.io/name: promtail
  name: promtail
  namespace: monitoring
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: promtail
  template:
    metadata:
      labels:
        app.kubernetes.io/component: log-collector
        app.kubernetes.io/name: promtail
    spec:
      serviceAccountName: promtail
      tolerations:
        - effect: NoSchedule
          key: node-role.kubernetes.io/master
          operator: Exists
        - effect: NoSchedule
          key: node-role.kubernetes.io/control-plane
          operator: Exists
      initContainers:
        - name: resolve-loki-url
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              URL="${LOKI_URL:-http://100.109.69.110:3100/loki/api/v1/push}"
              sed "s|LOKI_URL_PLACEHOLDER|${URL}|g" /config/promtail.yaml > /out/promtail.yaml
              echo "LOKI_URL=${URL}"
          env:
            - name: LOKI_URL
              value: "http://100.109.69.110:3100/loki/api/v1/push"
          volumeMounts:
            - mountPath: /config
              name: config
              readOnly: true
            - mountPath: /out
              name: config-resolved
      containers:
        - name: promtail
          image: grafana/promtail:2.9.3
          imagePullPolicy: IfNotPresent
          args:
            - -config.file=/etc/promtail/promtail.yaml
          env:
            - name: LOKI_URL
              value: "http://100.109.69.110:3100/loki/api/v1/push"
          ports:
            - name: http
              containerPort: 9080
              protocol: TCP
          resources:
            limits:
              memory: 128Mi
            requests:
              cpu: 50m
              memory: 64Mi
          securityContext:
            readOnlyRootFilesystem: true
            runAsUser: 0
            runAsGroup: 0
          volumeMounts:
            - mountPath: /etc/promtail
              name: config-resolved
              readOnly: true
            - mountPath: /run/promtail
              name: run
            - mountPath: /var/log/pods
              name: pods
              readOnly: true
            - mountPath: /var/log/containers
              name: containers
              readOnly: true
      volumes:
        - name: config
          configMap:
            name: promtail-config
        - name: config-resolved
          emptyDir: {}
        - name: run
          hostPath:
            path: /run/promtail
            type: DirectoryOrCreate
        - name: pods
          hostPath:
            path: /var/log/pods
            type: Directory
        - name: containers
          hostPath:
            path: /var/log/containers
            type: Directory
  updateStrategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
