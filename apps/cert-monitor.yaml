apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cert-monitor
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/brianho1/homelab-ops
    targetRevision: HEAD
    path: charts/cert-monitor
  destination:
    server: https://kubernetes.default.svc
    namespace: cert-monitor
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
